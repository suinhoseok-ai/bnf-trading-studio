[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "VITE_SUPABASE_ANON_KEY,VITE_SUPABASE_URL"

# Yahoo Finance 프록시 (프로덕션)
[[redirects]]
  from = "/api/yahoo/*"
  to = "/.netlify/functions/yahoo/:splat"
  status = 200

# 텔레그램 발송 프록시 (프로덕션)
[[redirects]]
  from = "/api/telegram"
  to = "/.netlify/functions/telegram"
  status = 200

# SPA 라우팅 fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
